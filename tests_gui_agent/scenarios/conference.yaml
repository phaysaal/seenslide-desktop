# P3: Conference mode E2E — CSV schedule import + OCR title auto-advance.
#
# A synthetic 3-talk deck (tests/pdfs/conference2026.pdf, generated by
# make_conference_deck.py) plays straight through with narration. The app
# must split it into 3 talks BY ITSELF: when the next scheduled talk's
# title slide appears on screen, OCR matches it (multi-line titles,
# presenter inside a multi-author list) and auto-advances — no Next Talk
# clicks. verify_talks then checks the DB: 3 talks with the scheduled
# titles, per-talk 1..N numbering, and each talk's first slide looking
# like its title page (the carry-over injection guarantee).
name: conference-ocr-auto-advance
steps:
  - launch: {wait: 12, cloud: true}
  - virtual_mic: {}
  - assert_screen: >
      the SeenSlide dashboard home view with a dark left sidebar
  # -- conference setup ------------------------------------------------------
  - click: {find: "the 'Conference' item in the left sidebar"}
  - wait: 2
  - assert_screen: >
      a conference setup form with a CONFERENCE NAME input and a talk
      schedule section
  - click: {find: "the text input field directly under the CONFERENCE NAME label"}
  - type: "Harness Research Symposium 2026"
  # -- import the schedule CSV through the real file dialog ------------------
  - click: {find: "the 'Import CSV…' button in the talk schedule section"}
  - wait: 2
  - assert_screen: >
      a file-open dialog titled 'Import Talk Schedule'
  # native GTK dialog: Ctrl+L opens the location bar, type the path, Enter
  - key: ctrl+l
  - type: "$FIXTURES/conference2026.csv"
  - key: Return
  - wait: 2
  - assert_screen: >
      the conference setup form with a talk schedule listing three talks
      including 'Adaptive Mesh Refinement' and 'Neural Program Synthesis'
  # -- launch ----------------------------------------------------------------
  - click: {find: "the 'Launch Conference' button"}
  # presenter FIRST (countdown runs under it — same ordering P1/P2 proved
  # out; anything else lets capture go ACTIVE on the bare app screen and
  # junk frames become talk 1's first slides). hold_first 20 covers
  # narration build + countdown + gate arm before page 2.
  # 9 pages: 3 talks x (title + 2 content). 10s/page gives the 2s capture
  # cadence + ~3s OCR check ample room on each title slide.
  - present_pdf: {file: conference2026.pdf, page_interval: 10, hold_first: 20,
                  max_pages: 9, narrate: true}
  # deck is playing — log the live viewer URL while it runs
  - show_cloud_code: {timeout: 60}
  - wait_presenter: {timeout: 300}
  - wait: 3
  - assert_screen: >
      the live presentation view with a talk progress chip and a red
      'End Conference' button
  - click: {find: "the red 'End Conference' button"}
  - wait: 12
  # -- oracles ---------------------------------------------------------------
  - verify_db: {slides: {min: 8, max: 20}}
  - verify_talks:
      count: 3
      min_slides: 2
      schedule:
        - {title: "Adaptive Mesh Refinement"}
        - {title: "Neural Program Synthesis"}
        - {title: "Fault-Tolerant Quantum"}
      file: conference2026.pdf
      title_pages: [1, 4, 7]
      max_distance: 16
  - verify_slides_match_pdf: {file: conference2026.pdf, max_distance: 16, min_matched: 7}
  # 9 real pages (+small slack for talk-transition artifacts) — the tail
  # app-screen frames must NOT be here now that the gate hides them
  - verify_cloud: {slides: {min: 8, max: 12}}
  # slide gate: armed at countdown start, tail frames hidden, none uploaded
  - verify_hidden: {min: 1, max: 8}
  # last talk's recording: ~30s of narration with markers on its slides
  - verify_voice: {min_duration: 15, min_markers: 2, min_peak: 0.05}
  - kill: {}
