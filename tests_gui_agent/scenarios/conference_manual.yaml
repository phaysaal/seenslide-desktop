# P4b: conference with MANUAL Next-Talk advance (OCR auto-advance disabled).
# The deck plays in three presenter segments (pages 1-3, 4-6, 7-9) with the
# organizer clicking "Next Talk" between them — exactly how a conference
# with breaks between speakers runs. The app must split the talks at the
# clicks: 3 talks with the scheduled titles, each opening (first VISIBLE
# slide — the gate hides the between-talks app frames) on its title page.
name: conference-manual-next-talk
steps:
  - launch: {wait: 12, cloud: true}
  - virtual_mic: {}
  - click: {find: "the 'Conference' item in the left sidebar"}
  - wait: 2
  - click: {find: "the text input field directly under the CONFERENCE NAME label"}
  - type: "Manual Advance Symposium"
  - click: {find: "the 'Import CSV…' button in the talk schedule section"}
  - wait: 2
  - key: ctrl+l
  - type: "$FIXTURES/conference2026.csv"
  - key: Return
  - wait: 2
  - assert_screen: >
      the conference setup form with a talk schedule listing three talks
      including 'Adaptive Mesh Refinement'
  # OCR auto-advance OFF — this scenario is about the manual button
  - click: {find: "the green pill-shaped 'Enabled' toggle under the AUTO-ADVANCE TALKS label"}
  - wait: 1
  - click: {find: "the 'Launch Conference' button"}
  # talk 1: pages 1-3 (hold_first covers the 10s countdown)
  - present_pdf: {file: conference2026.pdf, start_page: 1, max_pages: 3,
                  page_interval: 6, hold_first: 16}
  - show_cloud_code: {timeout: 60}
  - wait_presenter: {timeout: 120}
  - wait: 3
  - assert_screen: >
      the live presentation view with a 'Talk 1 of 3' progress chip and a
      'Next Talk' button
  - click: {find: "the 'Next Talk' button in the live view"}
  - wait: 5
  # talk 2: pages 4-6
  - present_pdf: {file: conference2026.pdf, start_page: 4, max_pages: 3,
                  page_interval: 6, hold_first: 8}
  - wait_presenter: {timeout: 120}
  - wait: 3
  - click: {find: "the 'Next Talk' button in the live view"}
  - wait: 5
  # talk 3: pages 7-9
  - present_pdf: {file: conference2026.pdf, start_page: 7, max_pages: 3,
                  page_interval: 6, hold_first: 8}
  - wait_presenter: {timeout: 120}
  - wait: 3
  - click: {find: "the red 'End Conference' button"}
  - wait: 12
  # -- oracles ---------------------------------------------------------------
  - verify_db: {slides: {min: 9, max: 26}}
  - verify_talks:
      count: 3
      min_slides: 2
      schedule:
        - {title: "Adaptive Mesh Refinement"}
        - {title: "Neural Program Synthesis"}
        - {title: "Fault-Tolerant Quantum"}
      file: conference2026.pdf
      title_pages: [1, 4, 7]
      max_distance: 16
  - verify_slides_match_pdf: {file: conference2026.pdf, max_pages: 9,
                              max_distance: 16, min_matched: 7}
  - verify_cloud: {slides: {min: 8, max: 10}}
  - verify_hidden: {min: 1, cloud_slack: 0}
  - kill: {}
